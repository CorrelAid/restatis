<h2>Clear clipboard</h2>

<h3>Description</h3>

<p>Clear the system clipboard.
</p>


<h3>Usage</h3>

<pre><code class='language-R'>clear_clip(...)
</code></pre>


<h3>Arguments</h3>

<table role = "presentation">
<tr><td><code id="...">...</code></td>
<td>
<p>Pass other options to <code><a href="../../clipr/help/write_clip.html">write_clip()</a></code>.</p>
</td></tr>
</table>


<h3>Note</h3>

<p>This is a wrapper function for <code>write_clip("")</code>
</p>
